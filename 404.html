<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — AEL Digital Studio</title>
  <style>
    :root { --primary: #0074FF; --bg: #000; --text: #eef2ff; --text-secondary: #9ab3e6; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 20px; }
    .container { max-width: 500px; }
    .code { font-size: 96px; font-weight: 800; background: linear-gradient(135deg, var(--primary), #4d9bff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    h1 { font-size: 24px; margin-bottom: 12px; }
    p { color: var(--text-secondary); margin-bottom: 32px; }
    a { display: inline-block; padding: 12px 32px; background: var(--primary); color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; transition: opacity .2s; }
    a:hover { opacity: .85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <h1>Page not found</h1>
    <p>This page doesn't exist or has been moved.</p>
    <a href="/ael-learn-opencode-course/">Back to Course</a>
  </div>
</body>
</html>

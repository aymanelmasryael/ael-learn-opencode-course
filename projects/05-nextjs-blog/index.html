<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AEL Tech Blog — Next.js</title>
  <style>
    :root { --primary: #0074FF; --bg: #030712; --bg-card: rgba(5,12,24,.7); --text: #eef2ff; --text-secondary: #9ab3e6; --border: rgba(0,116,255,.25); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .navbar { position: sticky; top: 0; display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; background: rgba(3,7,18,.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); z-index: 100; }
    .nav-brand { font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px; }
    .nav-brand span { color: var(--primary); }
    .nav-links { display: flex; gap: 20px; }
    .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 13px; }
    .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
    .hero { text-align: center; padding: 60px 0; }
    .hero h1 { font-size: 42px; margin-bottom: 12px; }
    .hero h1 span { background: linear-gradient(135deg, var(--primary), #4d9bff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .hero p { color: var(--text-secondary); font-size: 16px; }
    .search-bar { margin: 32px 0; }
    .search-bar input { width: 100%; padding: 14px 20px; border-radius: 40px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text); font-size: 14px; }
    .posts-grid { display: grid; gap: 20px; }
    .post-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; transition: all .2s; cursor: pointer; }
    .post-card:hover { border-color: var(--primary); transform: translateY(-2px); }
    .post-card .date { font-size: 11px; color: var(--text-secondary); font-family: 'SF Mono', monospace; margin-bottom: 8px; }
    .post-card h3 { font-size: 18px; margin-bottom: 8px; }
    .post-card p { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 12px; }
    .post-card .tags { display: flex; gap: 6px; flex-wrap: wrap; }
    .post-card .tags span { padding: 3px 10px; border-radius: 10px; background: rgba(0,116,255,.08); border: 1px solid rgba(0,116,255,.1); font-size: 10px; color: var(--text-secondary); font-family: 'SF Mono', monospace; }
    .post-card .meta { display: flex; gap: 16px; font-size: 11px; color: var(--text-muted, #64748b); margin-top: 12px; font-family: 'SF Mono', monospace; }
    .footer { text-align: center; padding: 40px 20px; border-top: 1px solid var(--border); font-size: 12px; color: #64748b; }
    @media (max-width: 768px) { .hero h1 { font-size: 28px; } }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">AEL<span>Tech</span> Blog</div>
    <div class="nav-links">
      <a href="#">Home</a>
      <a href="#">Blog</a>
      <a href="#">About</a>
    </div>
  </nav>
  <div class="container">
    <div class="hero">
      <h1><span>AEL Tech</span> Blog</h1>
      <p>Thoughts on OpenCode, agentic coding, and modern web development</p>
    </div>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="🔍 Search posts by title or tag..." oninput="filterPosts()">
    </div>
    <div class="posts-grid" id="postsGrid"></div>
  </div>
  <footer class="footer">© 2026 AEL Digital Studio — Ayman Elmasry · Built with Next.js & OpenCode</footer>
  <script>
    const POSTS = [
      { title: 'Getting Started with OpenCode', excerpt: 'A complete walkthrough of installing OpenCode and running your first AI-powered coding agent.', date: '2026-07-09', tags: ['opencode', 'getting-started'], readingTime: 5 },
      { title: 'Understanding MCP Protocol', excerpt: 'How Model Context Protocol connects your agent to databases, APIs, and file systems.', date: '2026-07-08', tags: ['mcp', 'protocol', 'tools'], readingTime: 8 },
      { title: 'Building Custom Agents That Scale', excerpt: 'Design agent teams with orchestrators and specialized sub-agents for production apps.', date: '2026-07-07', tags: ['agents', 'orchestrator', 'architecture'], readingTime: 10 },
      { title: 'Mastering Agent Skills', excerpt: 'Create reusable, parameterized skills that encode domain expertise for repeatable workflows.', date: '2026-07-06', tags: ['skills', 'workflows', 'automation'], readingTime: 6 },
      { title: 'Free AI Models for Agentic Coding', excerpt: 'A practical guide to using Claude Haiku, Gemini Flash, and DeepSeek with OpenCode.', date: '2026-07-05', tags: ['ai-models', 'free', 'guide'], readingTime: 7 }
    ];

    function renderPosts(posts) {
      document.getElementById('postsGrid').innerHTML = posts.map(p => `
        <div class="post-card">
          <div class="date">${p.date}</div>
          <h3>${p.title}</h3>
          <p>${p.excerpt}</p>
          <div class="tags">${p.tags.map(t => `<span>${t}</span>`).join('')}</div>
          <div class="meta"><span>📖 ${p.readingTime} min read</span></div>
        </div>
      `).join('');
    }

    function filterPosts() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      renderPosts(POSTS.filter(p => p.title.toLowerCase().includes(q) || p.tags.some(t => t.includes(q))));
    }

    renderPosts(POSTS);
  </script>
</body>
</html>
